spring.application.name=LibraryManagment

# Database configuration
spring.datasource.url=jdbc:mysql://localhost:3306/librarymanagmentsystem
spring.datasource.username=root
spring.datasource.password=12345

# JPA configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

jwt.secretkey=${jwt-secret-key}

# Mail configuration (Gmail example - replace with your credentials)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
